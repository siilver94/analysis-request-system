            - confrmRequest:
                Control: GroupContainer@1.5.0
                Variant: ManualLayout
                Properties:
                  Fill: =RGBA(255, 255, 255, 1)
                  Height: =653
                  Visible: =varShowRequestPopup && (varRequestMode = "New" || varRequestMode = "Edit")
                  Width: =1019
                  Y: =62
                Children:
                  - frmAnalysisRequest:
                      Control: Form@2.4.4
                      Layout: Vertical
                      Properties:
                        BorderColor: =RGBA(243, 242, 241, 1)
                        DataSource: =Analysis_Request_DB
                        Height: =597
                        Item: =varSelectedRequest
                        NumberOfColumns: =2
                        OnSuccess: |-
                          =// =============================
                          // 해석 의뢰 신규 저장 후 시스템 컬럼 자동 세팅
                          // =============================
                          If(
                              varRequestMode = "New",

                              // 1. 신규 의뢰번호 생성
                              Set(
                                  varNewRequestNo,
                                  "AR-" & Text(Year(Now())) & "-" & Text(Self.LastSubmit.ID, "0000")
                              );

                              // 2. 내부 연결 키 생성
                              Set(
                                  varNewRequestIDKey,
                                  Text(GUID())
                              );

                              // 3. 현재 요청자의 팀 팀장 정보 조회
                              Set(
                                  varRequesterLeaderInfo,
                                  LookUp(
                                      UserInfo_DB,
                                      팀 = varMyTeam &&
                                      직급2 = "팀장"
                                  )
                              );

                              // 4. 메인 요청 DB에 시스템 정보 보강 저장
                              Patch(
                                  Analysis_Request_DB,
                                  Self.LastSubmit,
                                  {
                                      RequestNo: varNewRequestNo,
                                      RequestIDKey: varNewRequestIDKey,

                                      // 요청자 정보
                                      DepartmentName: varMyDept,
                                      RequesterName: varMyName,
                                      RequesterEmail: varMyEmail,

                                      // 요청자 팀장
                                      RequesterLeaderEmail: Coalesce(varRequesterLeaderInfo.'e-mail', ""),

                                      // 가상검증 승인자 2명 고정값
                                      VAApprover1Email: varVAApprover1Email,
                                      VAApprover2Email: varVAApprover2Email,

                                      // 상태 초기값
                                      Status: { Value: "PendingTeamLeader" },

                                      // 담당자 초기값
                                      AssigneeEmail: Blank(),

                                      // 진행 관련 초기값
                                      ProgressPct: 0,
                                      LastRevisionNo: 0,
                                      AssigneeLastReadRevisionNo: 0,
                                      HasUnreadRevision: false,

                                      // 보고서 관련 초기값
                                      FinalReportAttached: false,
                                      FinalReportFilePath: Blank(),

                                      // 시간 로그
                                      SubmittedAt: Now(),
                                      LastRequesterModifiedAt: Now(),

                                      // 활성 여부
                                      IsActive: true
                                  }
                              );

                              // 5. 로그 DB에 등록 이력 저장
                              Patch(
                                  Analysis_Request_Log_DB,
                                  Defaults(Analysis_Request_Log_DB),
                                  {
                                      Title: "Submit",
                                      RequestIDKey: varNewRequestIDKey,
                                      RequestNo: varNewRequestNo,
                                      LogType: { Value: "Submit" },
                                      LogMessage: varMyName & "님이 해석 의뢰를 등록했습니다.",
                                      ActionByName: varMyName,
                                      ActionByEmail: varMyEmail,
                                      ActionRole: "Requester",
                                      ActionAt: Now(),
                                      RelatedRevisionNo: 0
                                  }
                              );

                              // 6. 팀장 승인 요청 메일 발송
                              If(
                                  !IsBlank(varRequesterLeaderInfo.'e-mail'),
                                  Office365Outlook.SendEmailV2(
                                      varRequesterLeaderInfo.'e-mail',
                                      "[해석의뢰] 팀장 승인 요청 - " & varNewRequestNo,
                                      Concatenate(
                                          "<div style='font-family:Segoe UI;'>",
                                          "<h3>해석 의뢰 승인 요청</h3>",
                                          "<p>아래 해석 의뢰에 대한 팀장 승인이 필요합니다.</p>",
                                          "<p><b>의뢰번호:</b> ", varNewRequestNo, "</p>",
                                          "<p><b>해석명:</b> ", Self.LastSubmit.Title, "</p>",
                                          "<p><b>의뢰자:</b> ", varMyName, "</p>",
                                          "<p><b>부서명:</b> ", varMyDept, "</p>",
                                          "<p><b>품명:</b> ", Self.LastSubmit.ProductName, "</p>",
                                          "<p><b>품번:</b> ", Self.LastSubmit.PartNo, "</p>",
                                          "<p><a href='", varAppUrl, "'>앱 바로가기</a></p>",
                                          "</div>"
                                      ),
                                      {
                                          IsHtml: true,
                                          Importance: "High"
                                      }
                                  )
                              )
                          );

                          // =============================
                          // 저장 후 공통 처리
                          // =============================
                          Refresh(Analysis_Request_DB);
                          Refresh(Analysis_Request_Log_DB);
                          Refresh(UserInfo_DB);

                          ResetForm(frmAnalysisRequest);
                          Set(varShowRequestPopup, false);
                          Set(varRequestMode, "View");
                          Set(varSelectedRequest, Defaults(Analysis_Request_DB));

                          Set(varToastMessage, "해석 의뢰가 등록되었습니다.");
                          Set(varShowToast, true);
