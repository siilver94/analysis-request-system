                                      HasUnreadRevision: false,
                                      FinalReportAttached: false,
                                      SubmittedAt: Now(),
                                      LastRequesterModifiedAt: Now(),
                                      IsActive: true
                                  }
                              );

                              Patch(
                                  Analysis_Request_Log_DB,
                                  Defaults(Analysis_Request_Log_DB),
                                  {
                                      Title: "Submit",
                                      RequestIDKey: varNewRequestIDKey,
                                      RequestNo: varNewRequestNo,
                                      LogType: { Value: "Submit" },
                                      LogMessage: varMyName & "님이 해석 의뢰를 등록했습니다.",
                                      ActionByName: varMyName,
                                      ActionByEmail: varMyEmail,
                                      ActionRole: "Requester",
                                      ActionAt: Now(),
                                      RelatedRevisionNo: 0
                                  }
                              );

                              If(
                                  !IsBlank(varRequesterLeaderInfo.'e-mail'),
                                  Office365Outlook.SendEmailV2(
                                      varRequesterLeaderInfo.'e-mail',
                                      "[해석의뢰] 팀장 승인 요청 - " & varNewRequestNo,
                                      Concatenate(
                                          "<div style='font-family:Segoe UI;'>",
                                          "<h3>해석 의뢰 승인 요청</h3>",
                                          "<p>아래 해석 의뢰에 대한 팀장 승인이 필요합니다.</p>",
                                          "<p><b>의뢰번호:</b> ", varNewRequestNo, "</p>",
                                          "<p><b>해석명:</b> ", Self.LastSubmit.Title, "</p>",
                                          "<p><b>의뢰자:</b> ", varMyName, "</p>",
                                          "<p><b>부서명:</b> ", varMyDept, "</p>",
                                          "<p><b>품명:</b> ", Self.LastSubmit.ProductName, "</p>",
                                          "<p><b>품번:</b> ", Self.LastSubmit.PartNo, "</p>",
                                          "<p><a href='", varAppUrl, "'>앱 바로가기</a></p>",
                                          "</div>"
                                      ),
                                      {
                                          IsHtml: true,
                                          Importance: "High"
                                      }
                                  )
                              )
                          );

                          // =============================
                          // 수정 후 후처리
                          // =============================
                          If(
                              varSavedRequestMode = "Edit",

                              Patch(
                                  Analysis_Request_DB,
                                  Self.LastSubmit,
                                  {
                                      LastRevisionNo: Coalesce(varSelectedRequest.LastRevisionNo, 0) + 1,
                                      LastRequesterModifiedAt: Now(),
                                      HasUnreadRevision: true
                                  }
                              );

                              Patch(
                                  Analysis_Request_Log_DB,
                                  Defaults(Analysis_Request_Log_DB),
                                  {
                                      Title: "Modify",
                                      RequestIDKey: varSelectedRequest.RequestIDKey,
                                      RequestNo: varSelectedRequest.RequestNo,
                                      LogType: { Value: "Modify" },
                                      LogMessage: varMyName & "님이 해석 의뢰 내용을 수정했습니다.",
                                      ActionByName: varMyName,
                                      ActionByEmail: varMyEmail,
                                      ActionRole: "Requester",
                                      ActionAt: Now(),
                                      RelatedRevisionNo: Coalesce(varSelectedRequest.LastRevisionNo, 0) + 1
                                  }
                              );

                              If(
                                  !IsBlank(varSelectedRequest.AssigneeEmail),
                                  Office365Outlook.SendEmailV2(
                                      varSelectedRequest.AssigneeEmail,
                                      "[해석의뢰] 수정본 도착 - " & varSelectedRequest.RequestNo,
