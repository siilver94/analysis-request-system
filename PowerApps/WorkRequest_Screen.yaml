      - conDeleteConfirmPopup:
          Control: GroupContainer@1.5.0
          Variant: ManualLayout
          Properties:
            Fill: =RGBA(255, 255, 255, 1)
            Height: =165
            Visible: |+
              =varShowDeleteConfirmPopup
            Width: =398
            X: =484
            Y: =301
          Children:
            - Text4:
                Control: ModernText@1.0.0
                Properties:
                  Align: =Align.Center
                  Text: ="정말 삭제하시겠습니까?"
                  Width: =398
                  Y: =41
            - btnDeleteYes:
                Control: Button@0.0.45
                Properties:
                  Appearance: ='ButtonCanvas.Appearance'.Secondary
                  BorderColor: =RGBA(0, 0, 0, 1)
                  BorderStyle: =BorderStyle.Solid
                  BorderThickness: =1
                  OnSelect: |-
                    =Remove(
                        Analysis_Request_DB,
                        varSelectedRequest
                    );

                    RemoveIf(
                        Analysis_Request_Log_DB,
                        RequestIDKey = varSelectedRequest.RequestIDKey
                    );

                    RemoveIf(
                        Analysis_Request_Revision_DB,
                        'RequestIDKey                            ' = varSelectedRequest.RequestIDKey
                    );

                    Refresh(Analysis_Request_DB);
                    Refresh(Analysis_Request_Log_DB);
                    Refresh(Analysis_Request_Revision_DB);

                    Set(varShowRequestPopup, false);
                    Set(varRequestMode, "View");
                    Set(varSelectedRequest, Defaults(Analysis_Request_DB));

                    Set(varToastMessage, "해석 의뢰가 삭제되었습니다.");
                    Set(varShowToast, true);
                    Set(varShowDeleteConfirmPopup, false);
                  Text: ="예"
                  Width: =85
                  X: =97
                  Y: =100
            - btnDeleteNo:
