                              OnSelect: "=Patch(\n    Analysis_Request_DB,\n    varSelectedRequest,\n    {\n        Status: { Value: \"InProgress\" },\n        AssigneeEmail: Lower(drpAssignee.Selected.'e-mail')\n    }\n);\n\nPatch(\n    Analysis_Request_Log_DB,\n    Defaults(Analysis_Request_Log_DB),\n    {\n        Title: \"VAApprove\",\n        RequestIDKey: varSelectedRequest.RequestIDKey,\n        RequestNo: varSelectedRequest.RequestNo,\n        LogType: { Value: \"VAApprove\" },\n        LogMessage: varMyName & \"님이 가상검증 승인을 완료하고 담당자를 배정했습니다.\",\n        ActionByName: varMyName,\n        ActionByEmail: varMyEmail,\n        ActionRole: \"VAApprover\",\n        ActionAt: Now(),\n        RelatedRevisionNo: varSelectedRequest.LastRevisionNo\n    }\n);\n\nPatch(\n    Analysis_Request_Log_DB,\n    Defaults(Analysis_Request_Log_DB),\n    {\n        Title: \"Assign\",\n        RequestIDKey: varSelectedRequest.RequestIDKey,\n        RequestNo: varSelectedRequest.RequestNo,\n        LogType: { Value: \"Assign\" },\n        LogMessage: drpAssignee.Selected.이름_한글 & \"님이 담당자로 배정되었습니다.\",\n        ActionByName: varMyName,\n        ActionByEmail: varMyEmail,\n        ActionRole: \"VAApprover\",\n        ActionAt: Now(),\n        RelatedRevisionNo: varSelectedRequest.LastRevisionNo\n    }\n);\n\n// 담당자 메일 발송\nIf(\n    !IsBlank(drpAssignee.Selected.'e-mail'),\n    Office365Outlook.SendEmailV2(\n        drpAssignee.Selected.'e-mail',\n        \"[해석의뢰] 담당자 배정 - \" & varSelectedRequest.RequestNo,\n        Concatenate(\n            \"<div style='font-family:Segoe UI;'>\",\n            \"<h3>해석 의뢰 담당자 배정 안내</h3>\",\n            \"<p>아래 해석 의뢰의 담당자로 배정되었습니다.</p>\",\n            \"<p><b>의뢰번호:</b> \", varSelectedRequest.RequestNo, \"</p>\",\n            \"<p><b>해석명:</b> \", varSelectedRequest.제목, \"</p>\",\n            \"<p><b>의뢰자:</b> \", varSelectedRequest.RequesterName, \"</p>\",\n            \"<p><b>품명:</b> \", varSelectedRequest.ProductName, \"</p>\",\n            \"<p><b>품번:</b> \", varSelectedRequest.PartNo, \"</p>\",\n            \"<p>앱에서 진행률, 예상 완료일, 작업 메모를 입력하며 작업을 진행해 주세요.</p>\",\n            \n            \"</div>\"\n        ),\n        {\n            IsHtml: true,\n            Importance: \"High\"\n        }\n    )\n);\n\n// 의뢰자 메일 발송\nIf(\n    !IsBlank(varSelectedRequest.RequesterEmail),\n    Office365Outlook.SendEmailV2(\n        varSelectedRequest.RequesterEmail,\n        \"[해석의뢰] 가상검증 승인 완료 및 담당자 배정 - \" & varSelectedRequest.RequestNo,\n        Concatenate(\n            \"<div style='font-family:Segoe UI;'>\",\n            \"<h3>가상검증 승인 완료</h3>\",\n            \"<p>등록하신 해석 의뢰가 가상검증 승인 완료되었고 담당자가 배정되었습니다.</p>\",\n            \"<p><b>의뢰번호:</b> \", varSelectedRequest.RequestNo, \"</p>\",\n            \"<p><b>해석명:</b> \", varSelectedRequest.제목, \"</p>\",\n            \"<p><b>담당자:</b> \", drpAssignee.Selected.이름_한글, \"</p>\",\n            \"<p><b>상태:</b> 진행중</p>\",\n            \n            \"</div>\"\n        ),\n        {\n            IsHtml: true,\n            Importance: \"Normal\"\n        }\n    )\n);\n\nRefresh(Analysis_Request_DB);\nRefresh(Analysis_Request_Log_DB);\n\nSet(\n    varSelectedRequest,\n    LookUp(Analysis_Request_DB, ID = varSelectedRequest.ID)\n);\n\nSet(varToastMessage, \"가상검증 승인 및 담당자 배정이 완료되었습니다.\");\nSet(varShowToast, true);"
