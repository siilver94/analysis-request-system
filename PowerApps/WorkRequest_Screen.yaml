                  - frmRevisionAttach:
                      Control: Form@2.4.4
                      Layout: Vertical
                      Properties:
                        BorderColor: =RGBA(243, 242, 241, 1)
                        DataSource: =Analysis_Request_Revision_DB
                        DefaultMode: =FormMode.New
                        Height: =150
                        Item: =Blank()
                        OnSuccess: |-
                          =// Revision 행에 메타데이터 Patch
                          // (첨부파일은 폼 제출 시 자동 저장됨, 여기선 나머지 컬럼만 채움)
                          If(
                              !IsBlank(Self.LastSubmit),
                              Patch(
                                  Analysis_Request_Revision_DB,
                                  Self.LastSubmit,
                                  {
                                      제목: If(
                                          varSavedRequestMode = "New",
                                          varNewRequestNo,
                                          varSelectedRequest.RequestNo
                                      ) & " Rev." & Text(varNewRevisionNo, "0"),

                                      'RequestIDKey                            ': If(
                                          varSavedRequestMode = "New",
                                          varNewRequestIDKey,
                                          varSelectedRequest.RequestIDKey
                                      ),

                                      RequestNo: If(
                                          varSavedRequestMode = "New",
                                          varNewRequestNo,
                                          varSelectedRequest.RequestNo
                                      ),

                                      RevisionNo:               varNewRevisionNo,
                                      RevisedByName:            varMyName,
                                      RevisedByEmail:           varMyEmail,
                                      RevisedAt:                Now(),
                                      DepartmentNameSnapshot:   varMyDept,
                                      RequesterNameSnapshot:    varMyName,
                                      AnalysisTitleSnapshot:    varSnapshotTitle,
                                      ProductNameSnapshot:      varSnapshotProduct,
                                      PartNoSnapshot:           varSnapshotPart,
                                      AnalysisReasonSnapshot:   varSnapshotReason,
                                      AnalysisConditionSnapshot: varSnapshotCondition,
                                      RevisionComment:          varRevisionComment
                                  }
                              )
                          );

                          // 새로고침
                          Refresh(Analysis_Request_DB);
                          Refresh(Analysis_Request_Revision_DB);
                          Refresh(Analysis_Request_Log_DB);
                          Refresh(UserInfo_DB);

                          // 폼 초기화
                          ResetForm(frmAnalysisRequest);
                          ResetForm(frmRevisionAttach);

                          // 팝업 닫기
                          Set(varShowRequestPopup, false);
                          Set(varRequestMode, "View");
                          Set(varSelectedRequest, Defaults(Analysis_Request_DB));
                          Reset(txtRevisionComment);

                          // 토스트
                          Set(
                              varToastMessage,
                              If(varSavedRequestMode = "New", "해석 의뢰가 등록되었습니다.", "해석 의뢰가 수정되었습니다.")
                          );
                          Set(varShowToast, true);
