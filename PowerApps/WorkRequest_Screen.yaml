Screens:
  WorkRequest_Screen:
    Properties:
      Fill: =
      LoadingSpinnerColor: =RGBA(98, 100, 167, 1)
      OnVisible: |-
        =Set(
            varAppUrl,
            "https://apps.powerapps.com/play/e/ad9a8659-6733-e9a7-8538-15b993f9459a/a/7fa36ba2-8820-4841-808d-c8e9d75f30b6?tenantId=f68dbec8-0e62-41cb-98b3-22f1aa40c4ea&hint=b57ade5e-ffd3-4356-b3e2-1b89b353f811&sourcetime=1776065643109"
        );

        // =============================
        // [1] 현재 로그인 사용자 정보
        // =============================
        Set(varMyEmail, Lower(User().Email));

        Set(
            varMyInfo,
            LookUp(
                UserInfo_DB,
                Lower('e-mail') = varMyEmail
            )
        );

        Set(
            varMyName,
            Coalesce(
                varMyInfo.이름_한글,
                Trim(
                    If(
                        IsBlank(Find("(", User().FullName)),
                        Concatenate(
                            Trim(Right(User().FullName, Len(User().FullName) - Find(" ", User().FullName))),
                            Trim(Left(User().FullName, Find(" ", User().FullName)))
                        ),
                        Trim(Left(User().FullName, Find("(", User().FullName) - 1))
                    )
                )
            )
        );

        Set(varMyDept, Coalesce(varMyInfo.부문, ""));
        Set(varMyTeam, Coalesce(varMyInfo.팀, ""));
        Set(varMyJobGrade, Coalesce(varMyInfo.직급2, ""));

        // =============================
        // [2] 역할 판단
        // =============================
        Set(varIsTeamLeader, varMyJobGrade = "팀장");

        Set(
            varIsVAApprover,
            varMyEmail in [
                Lower("donggyu.lee@tym.world"), //이동규 주임
                //Lower("E2603003@tym.world")    //임서현 주임
                Lower("eunseong.kim@tym.world")
            ]
        );

        // =============================
        // [3] 가상검증 승인자 고정값
        // 이름은 저장하지 않고 이메일만 사용
        // =============================
        Set(varVAApprover1Email, Lower("donggyu.lee@tym.world")); //이동규 주임
        Set(varVAApprover2Email, Lower("E2603003@tym.world"));   //임서현 주

        // =============================
        // [4] 화면 상태 변수 초기화
        // =============================
        Set(varShowRequestPopup, false);
        Set(varRequestMode, "View");
        Set(varSelectedRequest, Defaults(Analysis_Request_DB));

        // =============================
        // [5] 필터 기본값
        // =============================
        Set(varPeriodFilter, "30일");
        Set(varSearchText, "");
        Set(varIncludeCompleted, true);
        Set(varIncludeRejected, true);

        Set(varDateFrom, DateAdd(Today(), -30, TimeUnit.Days));
        Set(varDateTo, Now());

        // =============================
        // [6] 토스트 / 팝업 상태
        // =============================
        Set(varShowToast, false);
        Set(varToastMessage, "");

        // =============================
        // [7] 데이터 새로고침
        // =============================
        Refresh(Analysis_Request_DB);
        Refresh(Analysis_Request_Revision_DB);
        Refresh(Analysis_Request_Log_DB);
        Refresh(UserInfo_DB);
        Refresh(Analysis_Request_Files);
        Refresh(Analysis_Report_Files);
