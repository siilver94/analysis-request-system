                        - btnChangeAssignee:
                            Control: ModernButton@1.0.0
                            Properties:
                              Appearance: =ButtonAppearance.Secondary
                              BorderStyle: =BorderStyle.Solid
                              DisplayMode: |-
                                =If(
                                          IsBlank(drpAssignee.Selected) || IsBlank(drpAssignee.Selected.'e-mail'),
                                          DisplayMode.Disabled,
                                          DisplayMode.Edit
                                      )
                              Font: =Font.Verdana
                              OnSelect: |-
                                =// 선택된 담당자 정보를 변수로 먼저 고정 (화면 갱신에 영향 안 받도록)
                                Set(varOldAssigneeEmail, varSelectedRequest.AssigneeEmail);
                                Set(varOldAssigneeName, LookUp(UserInfo_DB, Lower('e-mail') = Lower(varOldAssigneeEmail)).이름_한글);
                                Set(varNewAssigneeEmail, Lower(drpAssignee.Selected.'e-mail'));
                                Set(varNewAssigneeName, drpAssignee.Selected.이름_한글);

                                If(
                                    Lower(varOldAssigneeEmail) = varNewAssigneeEmail,
                                    Notify("현재 담당자와 동일합니다.", NotificationType.Warning),

                                    // 담당자 변경 Patch
                                    Patch(
                                        Analysis_Request_DB,
                                        varSelectedRequest,
                                        {
                                            AssigneeEmail: varNewAssigneeEmail
                                        }
                                    );

                                    // 로그 기록
                                    Patch(
                                        Analysis_Request_Log_DB,
                                        Defaults(Analysis_Request_Log_DB),
                                        {
                                            Title: "AssigneeChanged",
                                            RequestIDKey: varSelectedRequest.RequestIDKey,
                                            RequestNo: varSelectedRequest.RequestNo,
                                            LogType: { Value: "AssigneeChanged" },
                                            LogMessage: varMyName & "님이 담당자를 " & Coalesce(varOldAssigneeName, "-") & "에서 " & varNewAssigneeName & "(으)로 변경했습니다.",
                                            ActionByName: varMyName,
                                            ActionByEmail: varMyEmail,
                                            ActionRole: "VAApprover",
                                            ActionAt: Now(),
                                            RelatedRevisionNo: varSelectedRequest.LastRevisionNo
                                        }
                                    );

                                    // 새 담당자에게 메일
                                    Office365Outlook.SendEmailV2(
                                        varNewAssigneeEmail,
                                        "[해석의뢰] 담당자 변경 안내 - " & varSelectedRequest.RequestNo,
                                        Concatenate(
                                            "<div style='font-family:Segoe UI;'>",
                                            "<h3>담당자 변경 안내</h3>",
                                            "<p>아래 해석 의뢰의 담당자로 새로 지정되었습니다.</p>",
                                            "<p><b>의뢰번호:</b> ", varSelectedRequest.RequestNo, "</p>",
                                            "<p><b>해석명:</b> ", varSelectedRequest.제목, "</p>",
                                            "<p><b>의뢰자:</b> ", varSelectedRequest.RequesterName, "</p>",
                                            "<p>앱에서 진행 상황을 확인해 주세요.</p>",
                                            "</div>"
                                        ),
                                        { IsHtml: true, Importance: "High" }
                                    );

                                    // 의뢰자에게 메일
                                    If(
                                        !IsBlank(varSelectedRequest.RequesterEmail),
                                        Office365Outlook.SendEmailV2(
                                            varSelectedRequest.RequesterEmail,
                                            "[해석의뢰] 담당자 변경 안내 - " & varSelectedRequest.RequestNo,
                                            Concatenate(
                                                "<div style='font-family:Segoe UI;'>",
                                                "<h3>담당자 변경 안내</h3>",
