Screens:
  WorkRequest_Screen:
    Properties:
      Fill: =
      LoadingSpinnerColor: =RGBA(98, 100, 167, 1)
      OnVisible: "=\r\n\r\n// =============================\r\n// [1] 현재 로그인 사용자 정보\r\n// =============================\r\nSet(varMyEmail, Lower(User().Email));\r\n\r\nSet(\r\n    varMyInfo,\r\n    LookUp(\r\n        UserInfo_DB,\r\n        Lower('e-mail') = varMyEmail\r\n    )\r\n);\r\n\r\nSet(\r\n    varMyName,\r\n    Coalesce(\r\n        varMyInfo.이름_한글,\r\n        Trim(\r\n            If(\r\n                IsBlank(Find(\"(\", User().FullName)),\r\n                Concatenate(\r\n                    Trim(Right(User().FullName, Len(User().FullName) - Find(\" \", User().FullName))),\r\n                    Trim(Left(User().FullName, Find(\" \", User().FullName)))\r\n                ),\r\n                Trim(Left(User().FullName, Find(\"(\", User().FullName) - 1))\r\n            )\r\n        )\r\n    )\r\n);\r\n\r\nSet(varMyDept, Coalesce(varMyInfo.부문, \"\"));\r\nSet(varMyTeam, Coalesce(varMyInfo.팀, \"\"));\r\nSet(varMyJobGrade, Coalesce(varMyInfo.직급2, \"\"));\r\n\r\n// =============================\r\n// [2] 역할 판단\r\n// =============================\r\nSet(\r\n    varIsTeamLeader,\r\n    varMyJobGrade in [\"팀장\", \"소장\", \"이사\"]\r\n);\r\n\r\nSet(\r\n    varIsVAApprover,\r\n    varMyEmail in [\r\n        Lower(\"yoonju.park@tym.world\"),\r\n        Lower(\"donghyeon.gim@tym.world\")\r\n    ]\r\n);\r\n\r\n// 관리자 판단 (개발자 전용 — 전체 목록 조회)\r\nSet(\r\n    varIsAdmin,\r\n    varMyEmail in [Lower(\"eunseong.kim@tym.world\")] ||\r\n    varMyEmail in [Lower(\"rdplan@tym.world\")]\r\n);\r\n\r\n// 가상검증팀 소속 여부 (제목 인라인 수정 권한)\r\nSet(\r\n    varIsVATeamMember,\r\n    varMyTeam = \"가상검증팀\"\r\n);\r\n\r\n\r\n// =============================\r\n// [3] 가상검증 승인자 고정값\r\n// 이름은 저장하지 않고 이메일만 사용\r\n// =============================\r\nSet(varVAApprover1Email, Lower(\"yoonju.park@tym.world\"));\r\nSet(varVAApprover2Email, Lower(\"donghyeon.gim@tym.world\") );\r\n\r\n// 담당자 변경 권한자 (박윤주 팀장 전용)\r\nSet(\r\n    varIsAssigneeManager,\r\n   varMyEmail = Lower(\"yoonju.park@tym.world\")\r\n   \r\n);\r\n\r\n// =============================\r\n// [4] 화면 상태 변수 초기화\r\n// =============================\r\nSet(varShowRequestPopup, false);\r\nSet(varRequestMode, \"View\");\r\nSet(varSelectedRequest, Defaults(Analysis_Request_DB));\r\n\r\n// =============================\r\n// [5] 필터 기본값\r\n// =============================\r\nSet(varPeriodFilter, Text(Year(Today())) & \"년\");\r\n\r\nSet(varDateFrom, Date(Year(Today()), 1, 1));\r\nSet(varDateTo, Date(Year(Today()) + 1, 1, 1));\r\n\r\n// =============================\r\n// [6] 토스트 / 팝업 상태\r\n// =============================\r\nSet(varShowToast, false);\r\nSet(varToastMessage, \"\");\r\nSet(varIncludeCompleted, true);   // ← 추가\r\nSet(varIncludeRejected, true);    // ← 추가\r\nSet(varReportEditMode, false);\r\n\r\n// =============================\r\n// [7] 데이터 새로고침\r\n// =============================\r\nRefresh(Analysis_Request_DB);\r\nRefresh(Analysis_Request_Revision_DB);\r\nRefresh(Analysis_Request_Log_DB);\r\nRefresh(UserInfo_DB);\r\n\r\n\r\nClearCollect(\r\n    colPeriodOptions,\r\n\r\n    // 연도 목록 생성\r\n    ForAll(\r\n        SortByColumns(\r\n            AddColumns(\r\n                Distinct(\r\n                    Filter(\r\n                        Analysis_Request_DB,\r\n                        !IsBlank(SubmittedAt)\r\n                    ),\r\n                    Year(SubmittedAt)\r\n                ),\r\n                SortYear,\r\n                Value\r\n            ),\r\n            \"SortYear\",\r\n            SortOrder.Descending\r\n        ),\r\n        {Value: Text(Value) & \"년\"}\r\n    )\r\n);\r\n\r\n// 마지막에 \"전체\" 추가\r\nCollect(\r\n    colPeriodOptions,\r\n    {Value: \"전체\"}\r\n);\r\n\r\n// varSelectedRequest 선택 시 보고서 레코드 조회\r\nSet(\r\n    varReportRecord,\r\n    LookUp(\r\n        Analysis_Report_DB,\r\n        RequestIDKey = varSelectedRequest.RequestIDKey\r\n    )\r\n);"
    Children:
