                              OnSelect: |-
                                =Set(
                                    varLatestRevision,
                                    LookUp(
                                        Analysis_Request_Revision_DB,
                                        RequestIDKey = ThisItem.RequestIDKey &&
                                        RevisionNo = ThisItem.LastRevisionNo
                                    )
                                );

                                // varReportRecord 먼저 초기화
                                Set(varReportRecord, Blank());

                                Set(varSelectedRequest, ThisItem);
                                Set(varRequestMode, "View");
                                Set(varShowRequestPopup, true);

                                // 클릭한 의뢰 기준으로 보고서 레코드 재조회
                                Set(
