            - Text9:
                Control: ModernText@1.0.0
                Properties:
                  Align: =Align.Center
                  Font: =Font.Verdana
                  Height: =102
                  Text: |-
                    ="긴급 건에 한해 의뢰자 본인이 승인할 수 있습니다." & Char(10) &
                    "대리 승인 처리 후 작업자 확인 단계로 바로 넘어갑니다." & Char(10) & Char(10) &
                    "정말 대리 승인을 진행하시겠습니까?"
                  Width: =500
                  Y: =15
            - btnSelfApproveYes:
                Control: Button@0.0.45
                Properties:
                  Appearance: ='ButtonCanvas.Appearance'.Secondary
                  BorderColor: =RGBA(0, 0, 0, 1)
                  BorderStyle: =BorderStyle.Solid
                  BorderThickness: =1
                  Font: =Font.Verdana
                  OnSelect: |-
                    =// =============================
                    // 의뢰자 본인 대리 승인
                    // - 확인 팝업에서 [예] 클릭 시 실행
                    // - PendingLeader -> PendingWorker
                    // - self-approval 여부 기록
                    // - 작업자 알림 발송
                    // =============================

                    Patch(
                        Analysis_Request_DB,
                        varSelectedRequest,
                        {
                            ApprovalState: "PendingWorker",
                            ApprovedAt: Now(),
                            ApprovedByName: varMyName,
                            ApprovedByEmail: varMyEmail,
                            IsMySelfApproved: true,
                            LastActionByName: varMyName,
                            LastActionByEmail: varMyEmail,
                            LastActionAt: Now()
                        }
                    );

                    // 댓글 로그 저장
                    Patch(
                        WorkRequestComments_DB,
                        Defaults(WorkRequestComments_DB),
                        {
                            Title: "Comment",
                            RequestID: varSelectedRequest.ID,
                            RequestTitle: varSelectedRequest.제목,
                            RequestNo: varSelectedRequest.RequestNo,
                            CommentText: varMyName & "님이 긴급 건으로 대리 승인 처리했습니다. 작업자 확인 대기 상태입니다.",
                            CommentType: "SelfApprove",
                            CommentByName: varMyName,
                            CommentByEmail: varMyEmail,
                            CommentRole: "Requester",
                            CommentAt: Now(),
                            IsSystemComment: true,
                            IsVisible: true
                        }
                    );

                    // 작업자 메일 발송
                    If(
                        !IsBlank(varWorkerEmail),
                        Office365Outlook.SendEmailV2(
                            varWorkerEmail,
                            "[작업의뢰] 작업자 확인 요청 - " & varSelectedRequest.RequestNo,
                            Concatenate(
                                "<div style='font-family:Segoe UI;'>",
                                "<h3>작업자 확인 요청</h3>",
                                "<p>긴급 건으로 의뢰자가 대리 승인 처리한 작업의뢰가 있습니다.</p>",
                                "<p>수락 또는 반려를 진행해 주세요.</p>",
                                "<p><b>요청번호:</b> ", varSelectedRequest.RequestNo, "</p>",
                                "<p><b>제목:</b> ", varSelectedRequest.제목, "</p>",
                                "<p><b>의뢰자:</b> ", varSelectedRequest.RequesterName, "</p>",
                                "<p><a href='", varAppUrl, "'>앱 바로가기</a></p>",
                                "</div>"
                            ),
                            {
                                IsHtml: true,
                                Importance: "High"
                            }
                        )
                    );

                    Refresh(Analysis_Request_DB);
                    Refresh(WorkRequestComments_DB);

                    // 최신 데이터 다시 조회
                    Set(varSelectedRequest, LookUp(Analysis_Request_DB, ID = varSelectedRequest.ID));

                    // 팝업 닫기
                    Set(varShowSelfApproveConfirmPopup, false);

                    // 토스트
                    Set(varToastMessage, "대리 승인이 완료되었습니다.");
                    Set(varShowToast, true);
                  Text: ="예"
                  X: =143
                  Y: =131
