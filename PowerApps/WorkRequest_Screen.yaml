                          "<p><b>의뢰자:</b> ", varSelectedRequest.RequesterName, "</p>",
                          "<p><b>품명:</b> ", varSelectedRequest.ProductName, "</p>",
                          "<p><b>품번:</b> ", varSelectedRequest.PartNo, "</p>",
                          "<p>담당자를 지정한 뒤 승인 또는 반려를 진행해 주세요.</p>",
                          "<p><a href='", varAppUrl, "'>앱 바로가기</a></p>",
                          "</div>"
                      ),
                      {
                          IsHtml: true,
                          Importance: "High"
                      }
                  )
              );

              // 의뢰자 메일
              If(
                  !IsBlank(varSelectedRequest.RequesterEmail),
                  Office365Outlook.SendEmailV2(
                      varSelectedRequest.RequesterEmail,
                      "[해석의뢰] 팀장 승인 완료 - " & varSelectedRequest.RequestNo,
                      Concatenate(
                          "<div style='font-family:Segoe UI;'>",
                          "<h3>팀장 승인 완료</h3>",
                          "<p>등록하신 해석 의뢰가 팀장 승인되었습니다.</p>",
                          "<p><b>의뢰번호:</b> ", varSelectedRequest.RequestNo, "</p>",
                          "<p><b>해석명:</b> ", varSelectedRequest.Title, "</p>",
                          "<p><b>다음 단계:</b> 가상검증 승인 진행</p>",
                          "<p><a href='", varAppUrl, "'>앱 바로가기</a></p>",
                          "</div>"
                      ),
                      {
                          IsHtml: true,
                          Importance: "Normal"
                      }
                  )
              );

              Refresh(Analysis_Request_DB);
              Refresh(Analysis_Request_Log_DB);

              Set(
                  varSelectedRequest,
                  LookUp(Analysis_Request_DB, ID = varSelectedRequest.ID)
              );

              Set(varToastMessage, "팀장 승인이 완료되었습니다.");
              Set(varShowToast, true);

              Set(varShowRequestPopup, false);
              Set(varRequestMode, "View");
              Set(varSelectedRequest, Defaults(Analysis_Request_DB));
            Text: ="승인"
            Visible: =varShowRequestPopup && varRequestMode = "View"
            Width: =86
            X: =123
      - btnLeaderReject_2:
          Control: Button@0.0.45
          Properties:
            BasePaletteColor: =RGBA(220, 38, 38, 1)
            BorderColor: =RGBA(220, 38, 38, 1)
            Font: =Font.Verdana
            FontSize: =14
            OnSelect: |-
              =If(
                  IsBlank(Trim(txtLeaderRejectReason_1.Value)),
                  Notify("반려 사유를 입력해 주세요.", NotificationType.Warning),

                  Patch(
                      Analysis_Request_DB,
                      varSelectedRequest,
                      {
                          Status: { Value: "Rejected" },
                          RejectedAt: Now(),
                          RejectReason: Trim(txtLeaderRejectReason_1.Value)
                      }
                  );

                  Patch(
                      Analysis_Request_Log_DB,
                      Defaults(Analysis_Request_Log_DB),
                      {
                          Title: "TeamLeaderReject",
                          RequestIDKey: varSelectedRequest.RequestIDKey,
                          RequestNo: varSelectedRequest.RequestNo,
                          LogType: { Value: "TeamLeaderReject" },
                          LogMessage: varMyName & "님이 팀장 반려했습니다. 사유: " & Trim(txtLeaderRejectReason_1.Value),
                          ActionByName: varMyName,
                          ActionByEmail: varMyEmail,
                          ActionRole: "RequesterLeader",
                          ActionAt: Now(),
                          RelatedRevisionNo: varSelectedRequest.LastRevisionNo
                      }
                  );

                  // 의뢰자 메일 발송
                  If(
                      !IsBlank(varSelectedRequest.RequesterEmail),
                      Office365Outlook.SendEmailV2(
                          varSelectedRequest.RequesterEmail,
                          "[해석의뢰] 팀장 반려 - " & varSelectedRequest.RequestNo,
                          Concatenate(
                              "<div style='font-family:Segoe UI;'>",
                              "<h3>해석 의뢰 반려 안내</h3>",
                              "<p>등록하신 해석 의뢰가 팀장에 의해 반려되었습니다.</p>",
                              "<p><b>의뢰번호:</b> ", varSelectedRequest.RequestNo, "</p>",
                              "<p><b>해석명:</b> ", varSelectedRequest.Title, "</p>",
                              "<p><b>반려자:</b> ", varMyName, "</p>",
                              "<p><b>반려사유:</b> ", Trim(txtLeaderRejectReason_1.Value), "</p>",
                              "<p><a href='", varAppUrl, "'>앱 바로가기</a></p>",
                              "</div>"
                          ),
                          {
                              IsHtml: true,
                              Importance: "High"
                          }
                      )
                  );

                  Refresh(Analysis_Request_DB);
                  Refresh(Analysis_Request_Log_DB);

                  Set(
                      varSelectedRequest,
                      LookUp(Analysis_Request_DB, ID = varSelectedRequest.ID)
                  );

                  Set(varToastMessage, "팀장 반려가 완료되었습니다.");
                  Set(varShowToast, true)
              )
            Text: ="반려"
            Visible: =varShowRequestPopup && varRequestMode = "View"
            Width: =86
            X: =211
