                                                "<p><b>해석명:</b> ", varSelectedRequest.제목, "</p>",
                                                "<p><b>새 담당자:</b> ", varNewAssigneeName, "</p>",
                                                "</div>"
                                            ),
                                            { IsHtml: true, Importance: "Normal" }
                                        )
                                    );

                                    Refresh(Analysis_Request_DB);
                                    Refresh(Analysis_Request_Log_DB);

                                    Set(varSelectedRequest, LookUp(Analysis_Request_DB, ID = varSelectedRequest.ID));

                                    Set(varToastMessage, "담당자가 변경되었습니다.");
                                    Set(varShowToast, true)
