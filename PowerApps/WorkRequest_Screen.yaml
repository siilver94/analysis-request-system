                  - btnRequestSave:
                      Control: Button@0.0.45
                      Properties:
                        Appearance: ='ButtonCanvas.Appearance'.Secondary
                        BorderColor: =RGBA(0, 0, 0, 1)
                        BorderStyle: =BorderStyle.Solid
                        BorderThickness: =1
                        OnSelect: |-
                          =If(
                              IsBlank(Trim(txtAnalysisTitle.Text)) ||
                              IsBlank(Trim(txtProductName.Text)) ||
                              IsBlank(Trim(txtPartNo.Text)) ||
                              IsBlank(Trim(txtAnalysisReason.Value)) ||
                              IsBlank(Trim(txtAnalysisCondition.Value)),

                              Notify(
                                  "해석명, 품명, 품번, 해석사유, 해석조건 및 검토사항을 모두 입력해 주세요.",
                                  NotificationType.Warning
                              ),

                              If(
                                  varRequestMode = "Edit" && IsBlank(Trim(txtRevisionComment.Value)),
                                  Notify(
                                      "수정 사유를 입력해야 수정할 수 있습니다.",
                                      NotificationType.Warning
                                  ),

                                  // SubmitForm 전에 새 텍스트 값들을 변수로 저장
                                  // (폼 제출 후 컨트롤이 리셋되기 전에 캡처)
                                  Set(varSnapshotTitle,     Trim(txtAnalysisTitle.Text));
                                  Set(varSnapshotProduct,   Trim(txtProductName.Text));
                                  Set(varSnapshotPart,      Trim(txtPartNo.Text));
                                  Set(varSnapshotReason,    Trim(txtAnalysisReason.Value));
                                  Set(varSnapshotCondition, Trim(txtAnalysisCondition.Value));
                                  Set(varRevisionComment,   If(varRequestMode = "Edit", Trim(txtRevisionComment.Value), ""));

                                  // Rev 번호 사전 계산
                                  Set(
                                      varNewRevisionNo,
                                      If(
                                          varRequestMode = "New",
                                          1,
                                          Coalesce(varSelectedRequest.LastRevisionNo, 0) + 1
                                      )
                                  );

                                  SubmitForm(frmAnalysisRequest)
                              )
                          )
                        Text: ="등록"
                        Visible: =varRequestMode = "New" || varRequestMode = "Edit"
                        X: =634
                        Y: =583
                  - btnRequestCancel:
                      Control: Button@0.0.45
