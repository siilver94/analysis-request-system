            - confrmRequest:
                Control: GroupContainer@1.5.0
                Variant: ManualLayout
                Properties:
                  Fill: =RGBA(255, 255, 255, 1)
                  Height: =688
                  Visible: =varShowRequestPopup && (varRequestMode = "New" || varRequestMode = "Edit")
                  Width: =930
                  Y: =62
                Children:
                  - frmAnalysisRequest:
                      Control: Form@2.4.4
                      Layout: Vertical
                      Properties:
                        BorderColor: =RGBA(214, 221, 224, 1)
                        DataSource: =Analysis_Request_DB
                        Height: =590
                        Item: =varSelectedRequest
                        OnSuccess: "=// =============================\r\n// 현재 저장 모드 백업\r\n// =============================\r\nSet(varSavedRequestMode, varRequestMode);\r\n\r\n// =============================\r\n// 신규 등록 후 시스템 컬럼 자동 세팅\r\n// =============================\r\nIf(\r\n    varSavedRequestMode = \"New\",\r\n\r\n    Set(\r\n        varNewRequestNo,\r\n        \"CAE\" &\r\n        Text(Year(Now()) - 2000, \"00\") &\r\n        Text(\r\n            CountRows(\r\n                Filter(\r\n                    Analysis_Request_DB,\r\n                    Year(SubmittedAt) = Year(Now())\r\n                )\r\n            ) + 33,\r\n            \"000\"\r\n        )\r\n    );\r\n\r\n    Set(varNewRequestIDKey, Text(GUID()));\r\n\r\n    Set(\r\n        varRequesterLeaderInfo,\r\n        LookUp(\r\n            UserInfo_DB,\r\n            팀 = varMyTeam &&\r\n            직급2 = \"팀장\"\r\n        )\r\n    );\r\n\r\n    Patch(\r\n        Analysis_Request_DB,\r\n        Self.LastSubmit,\r\n        {\r\n            RequestNo:              varNewRequestNo,\r\n            RequestIDKey:           varNewRequestIDKey,\r\n            DepartmentName:         varMyDept,\r\n            RequesterTeam:          varMyTeam,\r\n            RequesterName:          varMyName,\r\n            RequesterEmail:         varMyEmail,\r\n            RequesterLeaderEmail:   Coalesce(varRequesterLeaderInfo.'e-mail', \"\"),\r\n            VAApprover1Email:       varVAApprover1Email,\r\n            VAApprover2Email:       varVAApprover2Email,\r\n            Status:                 { Value: \"PendingTeamLeader\" },\r\n            AssigneeEmail:          Blank(),\r\n            ProgressPct:            0,\r\n            LastRevisionNo:         1,    // ← Rev.1 생성되므로 1로 시작\r\n            AssigneeLastReadRevisionNo: 0,\r\n            HasUnreadRevision:      false,\r\n            FinalReportAttached:    false,\r\n            SubmittedAt:            Now(),\r\n            LastRequesterModifiedAt: Now(),\r\n            IsActive:               true\r\n        }\r\n    );\r\n\r\n    Patch(\r\n        Analysis_Request_Log_DB,\r\n        Defaults(Analysis_Request_Log_DB),\r\n        {\r\n            Title:              \"Submit\",\r\n            RequestIDKey:       varNewRequestIDKey,\r\n            RequestNo:          varNewRequestNo,\r\n            LogType:            { Value: \"Submit\" },\r\n            LogMessage:         varMyName & \"님이 해석 의뢰를 등록했습니다.\",\r\n            ActionByName:       varMyName,\r\n            ActionByEmail:      varMyEmail,\r\n            ActionRole:         \"Requester\",\r\n            ActionAt:           Now(),\r\n            RelatedRevisionNo:  1\r\n        }\r\n    );\r\n\r\n    If(\r\n        !IsBlank(varRequesterLeaderInfo.'e-mail'),\r\n        Office365Outlook.SendEmailV2(\r\n            varRequesterLeaderInfo.'e-mail',\r\n            \"[해석의뢰] 팀장 승인 요청 - \" & varNewRequestNo,\r\n            Concatenate(\r\n                \"<div style='font-family:Segoe UI;'>\",\r\n                \"<h3>해석 의뢰 승인 요청</h3>\",\r\n                \"<p>아래 해석 의뢰에 대한 팀장 승인이 필요합니다.</p>\",\r\n                \"<p><b>의뢰자:</b> \", varMyName, \"</p>\",\r\n                \"<p><b>의뢰번호:</b> \", varNewRequestNo, \"</p>\",\r\n                \"<p><b>해석명:</b> \", varSnapshotTitle, \"</p>\",\r\n                \"<p><b>품명:</b> \", varSnapshotProduct, \"</p>\",\r\n                \"<p><b>품번:</b> \", varSnapshotPart, \"</p>\",\r\n                \r\n                \"</div>\"\r\n            ),\r\n            { IsHtml: true, Importance: \"High\" }\r\n        )\r\n    )\r\n);\r\n\r\n// =============================\r\n// 수정 후 후처리\r\n// =============================\r\nIf(\r\n    varSavedRequestMode = \"Edit\",\r\n\r\n    Patch(\r\n        Analysis_Request_DB,\r\n        Self.LastSubmit,\r\n        {\r\n            LastRevisionNo:          varNewRevisionNo,\r\n            LastRequesterModifiedAt: Now(),\r\n            HasUnreadRevision:       true\r\n        }\r\n    );\r\n\r\n    Patch(\r\n        Analysis_Request_Log_DB,\r\n        Defaults(Analysis_Request_Log_DB),\r\n        {\r\n            Title:              \"Modify\",\r\n            RequestIDKey:       varSelectedRequest.RequestIDKey,\r\n            RequestNo:          varSelectedRequest.RequestNo,\r\n            LogType:            { Value: \"Modify\" },\r\n            LogMessage:         varMyName & \"님이 해석 의뢰 내용을 수정했습니다.\",\r\n            ActionByName:       varMyName,\r\n            ActionByEmail:      varMyEmail,\r\n            ActionRole:         \"Requester\",\r\n            ActionAt:           Now(),\r\n            RelatedRevisionNo:  varNewRevisionNo\r\n        }\r\n    );\r\n\r\n    If(\r\n        !IsBlank(varSelectedRequest.AssigneeEmail),\r\n        Office365Outlook.SendEmailV2(\r\n            varSelectedRequest.AssigneeEmail,\r\n            \"[해석의뢰] 수정본 도착 - \" & varSelectedRequest.RequestNo,\r\n            Concatenate(\r\n                \"<div style='font-family:Segoe UI;'>\",\r\n                \"<h3>해석 의뢰 수정 알림</h3>\",\r\n                \"<p>의뢰자가 해석 의뢰 내용을 수정했습니다.</p>\",\r\n                \"<p><b>의뢰번호:</b> \", varSelectedRequest.RequestNo, \"</p>\",\r\n                \"<p><b>해석명:</b> \", varSnapshotTitle, \"</p>\",\r\n                \"<p><b>의뢰자:</b> \", varMyName, \"</p>\",\r\n                \"<p>앱에서 최신 내용을 확인해 주세요.</p>\",\r\n               \r\n                \"</div>\"\r\n            ),\r\n            { IsHtml: true, Importance: \"High\" }\r\n        )\r\n    )\r\n);\r\n\r\n// =============================\r\n// 공통: Revision 첨부 폼 제출\r\n// (Refresh/팝업닫기/토스트는 frmRevisionAttach.OnSuccess에서 처리)\r\n// =============================\r\nSubmitForm(frmRevisionAttach)                                                                                                                                                                                                                                 "
