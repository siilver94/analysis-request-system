Screens:
  PrintScreen:
    Properties:
      Fill: =RGBA(255, 255, 255, 1)
      LoadingSpinnerColor: =RGBA(98, 100, 167, 1)
      OnVisible: |-
        =Set(varIsPrinting, true);
        Print();
        Set(varIsPrinting, false)
    Children:
      - btnBack:
          Control: ModernButton@1.0.0
          Properties:
            Appearance: =ButtonAppearance.Secondary
            BorderColor: =RGBA(0, 0, 0, 1)
            BorderStyle: =BorderStyle.Solid
            BorderThickness: =1
            OnSelect: =Back()
            Text: ="← 돌아가기"
            Visible: =!varIsPrinting
            Width: =120
            X: =60
            Y: =4
      - htPrintReport:
          Control: HtmlViewer@2.1.0
          Properties:
            DisabledBorderColor: =RGBA(200, 198, 196, 1)
            Font: =Font.'Segoe UI'
            Height: =723
            HtmlText: |-
              ="<html><body style='font-family:Malgun Gothic,sans-serif;margin:50px 60px;color:#0f172a;font-size:13px;background:#ffffff;'>

              <!-- 헤더 -->
              <table style='width:100%;border-collapse:collapse;margin-bottom:8px;'>
                <tr>
                  <td style='vertical-align:bottom;'>
                    <div style='font-size:11px;color:#94a3b8;letter-spacing:2px;font-weight:600;margin-bottom:4px;'>TYM CENTRAL R&D</div>
                    <div style='font-size:28px;font-weight:700;color:#0f172a;letter-spacing:-0.5px;'>해석 의뢰서</div>
                  </td>
                  <td style='vertical-align:bottom;text-align:right;'>
                    <div style='font-size:11px;color:#94a3b8;margin-bottom:4px;'>의뢰번호</div>
                    <div style='font-size:18px;font-weight:700;color:#1b263b;letter-spacing:1px;'>" & Coalesce(varSelectedRequest.RequestNo, "-") & "</div>
                  </td>
                </tr>
              </table>

              <div style='height:4px;background:#1b263b;margin-bottom:4px;'></div>
              <div style='height:1px;background:#cbd5e1;margin-bottom:32px;'></div>

              <!-- 요약 정보 -->
              <div style='font-size:11px;color:#1b263b;font-weight:700;letter-spacing:3px;margin-bottom:10px;'>SUMMARY · 요약 정보</div>
              <table style='width:100%;border-collapse:collapse;margin-bottom:32px;border-top:2px solid #1b263b;border-bottom:1px solid #cbd5e1;'>
                <tr>
                  <td style='background:#f8fafc;font-weight:600;color:#475569;padding:14px 16px;width:120px;border-bottom:1px solid #e2e8f0;border-right:1px solid #cbd5e1;font-size:12px;'>요청자</td>
                  <td style='padding:14px 16px;color:#0f172a;border-bottom:1px solid #e2e8f0;width:260px;font-weight:500;'>" & Coalesce(varSelectedRequest.RequesterName, "-") & "</td>
                  <td style='background:#f8fafc;font-weight:600;color:#475569;padding:14px 16px;width:120px;border-bottom:1px solid #e2e8f0;border-left:1px solid #e2e8f0;border-right:1px solid #cbd5e1;font-size:12px;'>팀</td>
                  <td style='padding:14px 16px;color:#0f172a;border-bottom:1px solid #e2e8f0;font-weight:500;'>" & Coalesce(varSelectedRequest.RequesterTeam, "-") & "</td>
                </tr>
                <tr>
                  <td style='background:#f8fafc;font-weight:600;color:#475569;padding:14px 16px;border-right:1px solid #cbd5e1;font-size:12px;'>요청일</td>
                  <td style='padding:14px 16px;color:#0f172a;font-weight:500;'>" & Text(varSelectedRequest.SubmittedAt, "yyyy년 mm월 dd일") & "</td>
                  <td style='background:#f8fafc;font-weight:600;color:#475569;padding:14px 16px;border-left:1px solid #e2e8f0;border-right:1px solid #cbd5e1;font-size:12px;'>희망완료일</td>
                  <td style='padding:14px 16px;color:#0f172a;font-weight:500;'>" & If(IsBlank(varSelectedRequest.ExpectedFinishDate), "-", Text(varSelectedRequest.ExpectedFinishDate, "yyyy년 mm월 dd일")) & "</td>
                </tr>
              </table>

              <!-- 상세 정보 -->
              <div style='font-size:11px;color:#1b263b;font-weight:700;letter-spacing:3px;margin-bottom:10px;'>DETAIL · 상세 정보</div>
              <table style='width:100%;border-collapse:collapse;margin-bottom:32px;border-top:2px solid #1b263b;border-bottom:1px solid #cbd5e1;'>
                <tr>
                  <td style='background:#f8fafc;font-weight:600;color:#475569;padding:14px 16px;width:120px;border-bottom:1px solid #e2e8f0;border-right:1px solid #cbd5e1;font-size:12px;'>품명</td>
                  <td style='padding:14px 16px;color:#0f172a;border-bottom:1px solid #e2e8f0;width:260px;font-weight:500;'>" & Coalesce(varSelectedRequest.ProductName, "-") & "</td>
                  <td style='background:#f8fafc;font-weight:600;color:#475569;padding:14px 16px;width:120px;border-bottom:1px solid #e2e8f0;border-left:1px solid #e2e8f0;border-right:1px solid #cbd5e1;font-size:12px;'>품번</td>
                  <td style='padding:14px 16px;color:#0f172a;border-bottom:1px solid #e2e8f0;font-weight:500;'>" & Coalesce(varSelectedRequest.PartNo, "-") & "</td>
                </tr>
                <tr>
                  <td colspan='4' style='background:#f8fafc;font-weight:600;color:#475569;padding:12px 16px;border-bottom:1px solid #e2e8f0;border-left:4px solid #1b263b;font-size:12px;'>해석사유</td>
                </tr>
                <tr>
                  <td colspan='4' style='padding:18px 20px;color:#0f172a;line-height:1.9;white-space:pre-wrap;background:#ffffff;border-bottom:1px solid #e2e8f0;font-size:13px;'>" & Coalesce(varSelectedRequest.AnalysisReason, "-") & "</td>
                </tr>
                <tr>
                  <td colspan='4' style='background:#f8fafc;font-weight:600;color:#475569;padding:12px 16px;border-bottom:1px solid #e2e8f0;border-left:4px solid #1b263b;font-size:12px;'>해석 조건 및 검토사항</td>
                </tr>
                <tr>
                  <td colspan='4' style='padding:18px 20px;color:#0f172a;line-height:1.9;white-space:pre-wrap;background:#ffffff;font-size:13px;'>" & Coalesce(varSelectedRequest.AnalysisCondition, "-") & "</td>
                </tr>
              </table>

              <!-- 푸터 -->
              <table style='width:100%;border-collapse:collapse;margin-top:48px;border-top:1px solid #cbd5e1;'>
                <tr>
                  <td style='padding-top:14px;font-size:11px;color:#94a3b8;'>
                    <span style='font-weight:600;color:#64748b;'>TYM 중앙기술연구소</span> &nbsp;·&nbsp; Central R&D Center
                  </td>
                  <td style='padding-top:14px;font-size:11px;color:#94a3b8;text-align:right;'>
                    출력일시 &nbsp;<span style='color:#475569;font-weight:500;'>" & Text(Now(), "yyyy.mm.dd hh:mm") & "</span>
                  </td>
                </tr>
              </table>

              </body></html>"
            Size: =10.5
            Width: =1281
            X: =39
            Y: =41
